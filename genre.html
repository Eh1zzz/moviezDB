<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genre — TMDB</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .page-header { padding:2.5rem 2rem 1.25rem; max-width:1440px; margin:0 auto; }
    .page-title  { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; letter-spacing:3px; }
    .page-title span { color:var(--accent); }
    .grid-wrap { max-width:1440px; margin:0 auto; }
    .grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(172px,1fr));
      gap:1.2rem; padding:0 2rem 3rem;
    }
    .card {
      background:var(--surface); border-radius:var(--radius); overflow:hidden;
      border:1.5px solid var(--border); text-decoration:none; color:inherit;
      display:block; position:relative;
      transition:transform .24s, box-shadow .24s, border-color .24s;
    }
    .card:hover { transform:translateY(-6px); box-shadow:0 20px 40px rgba(0,0,0,.55); border-color:var(--border-hi); }
    .card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; background:var(--surface2); transition:filter .24s; }
    .card:hover img { filter:brightness(1.08); }
    .card-badge {
      position:absolute; top:9px; right:9px;
      background:rgba(0,0,0,.76); backdrop-filter:blur(6px);
      color:var(--accent); font-size:.72rem; font-weight:600;
      padding:3px 8px; border-radius:4px; pointer-events:none;
    }
    .card-body { padding:.75rem; }
    .card-title { font-size:.84rem; font-weight:600; line-height:1.3; margin-bottom:3px; }
    .card-meta  { font-size:.74rem; color:var(--muted); }
    @media(max-width:500px){ .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;padding:0 1rem 2rem;} }
  </style>
</head>
<body>
<nav id="app-nav"></nav>

<div class="page-header">
  <div class="page-title" id="genre-title">GENRE <span>MOVIES</span></div>
</div>

<div id="spinner-container" class="spinner-wrap"><div class="spinner"></div></div>
<div class="grid-wrap hidden" id="grid-wrap"><div class="grid" id="container"></div></div>

<script src="shared.js"></script>
<script>
  App.buildNav('');
  const API_KEY = '6e3d6ad4aea48a0574572ba2f174e8bc';
  const IMG     = 'https://image.tmdb.org/t/p/w500';
  const spinner = document.getElementById('spinner-container');
  const gridWrap= document.getElementById('grid-wrap');
  const container=document.getElementById('container');
  const params  = new URLSearchParams(window.location.search);
  const genreId = params.get('genreId');
  const genreName=params.get('genreName');

  if (genreName) {
    document.getElementById('genre-title').innerHTML = `<span>${genreName.toUpperCase()}</span> MOVIES`;
    document.title = `${genreName} — TMDB`;
  }

  if (!genreId) {
    spinner.classList.add('hidden'); gridWrap.classList.remove('hidden');
    container.innerHTML = '<p class="error-msg">Error: No genre ID provided.</p>';
  } else {
    fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&sort_by=popularity.desc`,
      {headers:{accept:'application/json'}})
    .then(r=>r.json()).then(data=>{
      spinner.classList.add('hidden'); gridWrap.classList.remove('hidden');
      const results = data.results||[];
      if (!results.length) { container.innerHTML='<p class="error-msg">No movies found.</p>'; return; }
      results.forEach(m => {
        const a = document.createElement('a');
        a.href = `details.html?movieId=${m.id}`;
        a.className = 'card';
        a.innerHTML = `
          <img src="${m.poster_path?IMG+m.poster_path:''}" alt="${m.title||''}" loading="lazy">
          <div class="card-badge">★ ${m.vote_average?.toFixed(1)||'N/A'}</div>
          <div class="card-body">
            <div class="card-title">${m.title||'Untitled'}</div>
            <div class="card-meta">${m.release_date?.slice(0,4)||'—'}</div>
          </div>`;
        App.injectCardActions(a, m.id, 'movie', ()=>m.title||'');
        container.appendChild(a);
      });
    }).catch(()=>{
      spinner.classList.add('hidden'); gridWrap.classList.remove('hidden');
      container.innerHTML='<p class="error-msg">Failed to load genre movies.</p>';
    });
  }
</script>
</body>
</html>
