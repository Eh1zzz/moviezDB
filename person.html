<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Person — TMDB</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24; --surface3: #20202e;
      --accent: #e8b84b; --text: #f0eff4; --muted: #7a7a8c;
      --border: rgba(255,255,255,0.07); --green: #4caf50; --red: #e05252;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* Nav */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 64px;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--accent); cursor: pointer; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.85rem;
      font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
      padding: 6px 0; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s;
    }
    .nav-links a:hover { color: var(--text); border-color: var(--accent); }
    .back-btn {
      margin-left: auto; background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); padding: 7px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .back-btn:hover { color: var(--text); border-color: var(--accent); }

    /* Spinner */
    .spinner-wrap { display: flex; align-items: center; justify-content: center; padding: 8rem 0; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    /* Profile hero */
    .profile-hero {
      max-width: 1100px; margin: 0 auto;
      padding: 3rem 2rem 2rem;
      display: flex; gap: 3rem; align-items: flex-start;
    }
    .profile-poster {
      width: 220px; min-width: 220px; border-radius: 12px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      border: 1px solid var(--border); object-fit: cover;
      aspect-ratio: 2/3;
    }
    .profile-info { flex: 1; }
    .profile-name { font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem; letter-spacing: 2px; line-height: 1.05; margin-bottom: 1.25rem; }

    /* Stats row */
    .stats-row { display: flex; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 1.75rem; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .stat-value { font-size: 0.95rem; font-weight: 600; }
    .stat-value.gold { color: var(--accent); }

    /* Bio */
    .bio-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 0.6rem; }
    .bio-text {
      font-size: 0.88rem; line-height: 1.8; color: #b8b8cc;
      max-height: 160px; overflow: hidden; position: relative;
      transition: max-height 0.4s ease;
    }
    .bio-text.expanded { max-height: 2000px; }
    .bio-text::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 50px; background: linear-gradient(transparent, var(--bg));
      pointer-events: none; transition: opacity 0.3s;
    }
    .bio-text.expanded::after { opacity: 0; }
    .bio-toggle {
      background: none; border: none; color: var(--accent);
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      cursor: pointer; padding: 6px 0; margin-top: 4px;
    }
    .bio-toggle:hover { text-decoration: underline; }

    /* Main */
    .main { max-width: 1100px; margin: 0 auto; padding: 1rem 2rem 3rem; }

    /* Section */
    .section { margin-bottom: 2.5rem; }
    .section-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 2px;
      margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.75rem;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .section-count { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 500; color: var(--muted); }

    /* Movie grid */
    .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
    .movie-card {
      background: var(--surface); border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border); text-decoration: none; color: inherit;
      transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
      display: block; position: relative;
    }
    .movie-card:hover { transform: translateY(-5px); box-shadow: 0 16px 36px rgba(0,0,0,0.5); border-color: rgba(232,184,75,0.2); }
    .movie-card:hover img { filter: brightness(1.08); }
    .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; transition: filter 0.22s; }
    .card-badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.78); backdrop-filter: blur(6px);
      color: var(--accent); font-size: 0.72rem; font-weight: 600;
      padding: 2px 7px; border-radius: 4px;
    }
    .card-body { padding: 0.65rem; }
    .card-title { font-size: 0.8rem; font-weight: 600; line-height: 1.3; margin-bottom: 3px; }
    .card-role { font-size: 0.72rem; color: var(--muted); }

    /* Show more */
    .extra-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .toggle-btn {
      background: none; border: 1px solid var(--border); color: var(--accent);
      padding: 8px 18px; border-radius: 6px; font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; cursor: pointer; margin-top: 1rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .toggle-btn:hover { background: rgba(232,184,75,0.08); border-color: var(--accent); }

    .error-msg { color: var(--red); text-align: center; padding: 3rem; font-size: 0.95rem; }
    .empty-msg { color: var(--muted); text-align: center; padding: 2rem; font-size: 0.9rem; }

    @media (max-width: 640px) {
      .profile-hero { flex-direction: column; padding: 1.5rem; }
      .profile-poster { width: 160px; min-width: 160px; }
      .profile-name { font-size: 2.2rem; }
      .main { padding: 1rem 1.25rem 3rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo" onclick="history.back()">TMDB</div>
  <div class="nav-links">
    <a href="index.html">Movies</a>
    <a href="series.html">TV Series</a>
  </div>
  <a class="back-btn" onclick="history.back()">← Back</a>
</nav>

<div id="spinner-container" class="spinner-wrap"><div class="spinner"></div></div>
<div id="main-content" class="hidden"></div>

<script>
  const API_KEY = "6e3d6ad4aea48a0574572ba2f174e8bc";
  const IMG = "https://image.tmdb.org/t/p/w500";
  const spinner = document.getElementById("spinner-container");
  const mainContent = document.getElementById("main-content");
  const params = new URLSearchParams(window.location.search);
  const personId = params.get("personId");

  function avatar(name) {
    return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1a1a24&color=7a7a8c&size=400`;
  }

  function buildCardHtml(credit, roleText) {
    const img = credit.poster_path ? `${IMG}${credit.poster_path}` : '';
    const title = credit.title || credit.name || 'Untitled';
    const year = (credit.release_date || credit.first_air_date || '').slice(0, 4);
    const rating = credit.vote_average ? credit.vote_average.toFixed(1) : null;
    const href = credit.media_type === 'tv'
      ? `details.html?seriesId=${credit.id}`
      : `details.html?movieId=${credit.id}`;
    return `
      <a href="${href}" class="movie-card">
        ${img ? `<img src="${img}" alt="${title}" loading="lazy">` : `<div style="aspect-ratio:2/3;background:var(--surface2)"></div>`}
        ${rating ? `<div class="card-badge">★ ${rating}</div>` : ''}
        <div class="card-body">
          <div class="card-title">${title}${year ? ` <span style="color:var(--muted);font-weight:400">(${year})</span>` : ''}</div>
          <div class="card-role">${roleText}</div>
        </div>
      </a>
    `;
  }

  function buildSection(id, title, list, roleKey, initialCount = 8) {
    if (!list.length) return '';
    const initial = list.slice(0, initialCount);
    const extra = list.slice(initialCount);
    return `
      <div class="section">
        <div class="section-title">${title} <span class="section-count">${list.length}</span></div>
        <div class="movie-grid">${initial.map(c => buildCardHtml(c, c[roleKey] || '—')).join('')}</div>
        ${extra.length ? `
          <div id="extra-${id}" class="extra-grid hidden">${extra.map(c => buildCardHtml(c, c[roleKey] || '—')).join('')}</div>
          <button class="toggle-btn" data-target="${id}">Show more</button>
        ` : ''}
      </div>
    `;
  }

  if (!personId) {
    spinner.classList.add('hidden');
    mainContent.classList.remove('hidden');
    mainContent.innerHTML = `<p class="error-msg">Error: No person ID provided.</p>`;
  } else {
    fetch(`https://api.themoviedb.org/3/person/${personId}?api_key=${API_KEY}&append_to_response=combined_credits`, {
      headers: { accept: "application/json" }
    })
      .then(r => r.json())
      .then(person => {
        spinner.classList.add('hidden');
        mainContent.classList.remove('hidden');

        const name = person.name || "Unknown Person";
        const photo = person.profile_path ? `${IMG}${person.profile_path}` : avatar(name);
        document.title = `${name} — TMDB`;

        // Deduplicate credits by id, sort by popularity desc
        const castCredits = Object.values(
          (person.combined_credits?.cast || []).reduce((acc, c) => {
            if (!acc[c.id] || (c.vote_count > (acc[c.id].vote_count || 0))) acc[c.id] = c;
            return acc;
          }, {})
        ).sort((a, b) => (b.popularity || 0) - (a.popularity || 0));

        const crewCredits = Object.values(
          (person.combined_credits?.crew || []).reduce((acc, c) => {
            if (!acc[`${c.id}-${c.job}`]) acc[`${c.id}-${c.job}`] = c;
            return acc;
          }, {})
        ).sort((a, b) => (b.popularity || 0) - (a.popularity || 0));

        const age = person.birthday ? (() => {
          const birth = new Date(person.birthday);
          const end = person.deathday ? new Date(person.deathday) : new Date();
          return Math.floor((end - birth) / (365.25 * 24 * 60 * 60 * 1000));
        })() : null;

        const bio = person.biography || '';

        const castSection = buildSection('cast', 'Acting', castCredits, 'character');
        const crewSection = buildSection('crew', 'Crew', crewCredits, 'job');

        mainContent.innerHTML = `
          <div class="profile-hero">
            <img class="profile-poster" src="${photo}" alt="${name}">
            <div class="profile-info">
              <h1 class="profile-name">${name}</h1>
              <div class="stats-row">
                ${person.known_for_department ? `<div class="stat"><span class="stat-label">Known For</span><span class="stat-value gold">${person.known_for_department}</span></div>` : ''}
                ${person.birthday ? `<div class="stat"><span class="stat-label">Born</span><span class="stat-value">${person.birthday}</span></div>` : ''}
                ${age !== null ? `<div class="stat"><span class="stat-label">${person.deathday ? 'Age at Death' : 'Age'}</span><span class="stat-value">${age}</span></div>` : ''}
                ${person.deathday ? `<div class="stat"><span class="stat-label">Died</span><span class="stat-value">${person.deathday}</span></div>` : ''}
                ${person.place_of_birth ? `<div class="stat"><span class="stat-label">Birthplace</span><span class="stat-value">${person.place_of_birth}</span></div>` : ''}
                ${person.popularity ? `<div class="stat"><span class="stat-label">Popularity</span><span class="stat-value">${Math.round(person.popularity)}</span></div>` : ''}
              </div>
              ${bio ? `
                <div class="bio-label">Biography</div>
                <div class="bio-text" id="bio-text">${bio.replace(/\n\n/g, '<br><br>')}</div>
                <button class="bio-toggle" id="bio-toggle">Read more</button>
              ` : `<div class="bio-label">Biography</div><p style="color:var(--muted);font-size:0.88rem">No biography available.</p>`}
            </div>
          </div>

          <div class="main">
            ${castSection || crewSection ? castSection + crewSection : `<p class="empty-msg">No filmography available.</p>`}
          </div>
        `;

        // Bio toggle
        const bioText = document.getElementById('bio-text');
        const bioToggle = document.getElementById('bio-toggle');
        if (bioText && bioToggle) {
          // Hide toggle if bio is short enough to not overflow
          if (bioText.scrollHeight <= bioText.clientHeight + 10) {
            bioToggle.style.display = 'none';
            bioText.style.maxHeight = 'none';
            bioText.classList.add('expanded');
          }
          bioToggle.addEventListener('click', () => {
            const expanded = bioText.classList.toggle('expanded');
            bioToggle.textContent = expanded ? 'Read less' : 'Read more';
          });
        }

        // Section show more toggles
        document.querySelectorAll('.toggle-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const el = document.getElementById(`extra-${btn.dataset.target}`);
            const isHidden = el.classList.toggle('hidden');
            btn.textContent = isHidden ? 'Show more' : 'Show less';
          });
        });
      })
      .catch(err => {
        spinner.classList.add('hidden');
        mainContent.classList.remove('hidden');
        mainContent.innerHTML = `<p class="error-msg">Failed to load person details. Please try again.</p>`;
        console.error(err);
      });
  }
</script>
</body>
</html>
