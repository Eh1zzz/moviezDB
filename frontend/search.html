<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — MoviezDB</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .search-page { max-width:1440px; margin:0 auto; padding:2.5rem 2rem 4rem; }
    .search-heading { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:3px; margin-bottom:.4rem; }
    .search-heading em { color:var(--accent); font-style:normal; }
    .search-count { font-size:.8rem; color:var(--muted); margin-bottom:1.75rem; }

    /* Filter tabs */
    .filter-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:2rem; }
    .f-tab {
      padding:.65rem 1.25rem; font-size:.83rem; font-weight:600;
      color:var(--muted); cursor:pointer; border-bottom:2px solid transparent;
      margin-bottom:-1px; transition:color .2s, border-color .2s;
      background:none; font-family:'DM Sans',sans-serif;
    }
    .f-tab:hover { color:var(--text); }
    .f-tab.active { color:var(--text); border-bottom-color:var(--accent); }
    .f-tab-count {
      display:inline-flex; align-items:center; justify-content:center;
      width:18px; height:18px; border-radius:50%; font-size:.62rem;
      background:var(--surface2); margin-left:5px;
    }
    .f-tab.active .f-tab-count { background:var(--accent); color:#000; }

    /* Grids */
    .media-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1.2rem; }
    .people-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:1rem; }

    .m-card {
      background:var(--surface); border-radius:var(--radius); overflow:hidden;
      border:1.5px solid var(--border); text-decoration:none; color:inherit;
      display:block; position:relative;
      transition:transform .22s, box-shadow .22s, border-color .22s;
    }
    .m-card:hover { transform:translateY(-5px); box-shadow:0 16px 36px rgba(0,0,0,.55); border-color:var(--border-hi); }
    .m-card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; background:var(--surface2); }
    .m-badge {
      position:absolute; top:8px; right:8px;
      background:rgba(0,0,0,.78); backdrop-filter:blur(6px);
      color:var(--accent); font-size:.7rem; font-weight:600;
      padding:2px 7px; border-radius:4px; pointer-events:none;
    }
    .m-body { padding:.7rem; }
    .m-title { font-size:.82rem; font-weight:600; line-height:1.3; margin-bottom:3px; }
    .m-meta  { font-size:.72rem; color:var(--muted); }

    .p-row {
      display:flex; align-items:center; gap:.9rem;
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius); padding:.75rem;
      text-decoration:none; color:inherit;
      transition:border-color .2s, box-shadow .2s;
    }
    .p-row:hover { border-color:var(--border-hi); box-shadow:0 4px 20px rgba(0,0,0,.3); }
    .p-avatar { width:52px; height:52px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--surface2); }
    .p-name { font-weight:600; font-size:.88rem; margin-bottom:2px; }
    .p-dept { font-size:.74rem; color:var(--muted); }

    /* Section label within mixed results */
    .results-section-label {
      font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:2px;
      color:var(--muted); margin-bottom:.9rem;
    }
    .results-section + .results-section { margin-top:2rem; }

    /* load more */
    .lm-wrap { text-align:center; margin-top:2.5rem; }
    .lm-btn {
      background:var(--surface2); border:1.5px solid var(--border); color:var(--text);
      padding:10px 28px; border-radius:8px; font-family:'DM Sans',sans-serif;
      font-size:.88rem; font-weight:600; cursor:pointer; transition:all .2s;
    }
    .lm-btn:hover    { border-color:var(--accent); color:var(--accent); }
    .lm-btn:disabled { opacity:.4; cursor:default; }

    .empty-state { text-align:center; padding:5rem 2rem; color:var(--muted); }
    .empty-state h3 { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--text); margin-bottom:.5rem; letter-spacing:2px; }
    @media(max-width:500px){ .media-grid{grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:.75rem;} }
  </style>
</head>
<body>
<nav id="app-nav"></nav>

<div class="search-page">
  <h1 class="search-heading" id="heading">SEARCH <em>RESULTS</em></h1>
  <p class="search-count" id="result-count">Loading…</p>

  <div class="filter-tabs" id="filter-tabs">
    <button class="f-tab active" data-type="all">All <span class="f-tab-count" id="cnt-all">0</span></button>
    <button class="f-tab" data-type="movie">Movies <span class="f-tab-count" id="cnt-movie">0</span></button>
    <button class="f-tab" data-type="tv">TV <span class="f-tab-count" id="cnt-tv">0</span></button>
    <button class="f-tab" data-type="person">People <span class="f-tab-count" id="cnt-person">0</span></button>
  </div>

  <div id="spinner-container" class="spinner-wrap"><div class="spinner"></div></div>
  <div id="results" class="hidden"></div>
  <div class="lm-wrap hidden" id="lm-wrap">
    <button class="lm-btn" id="lm-btn">Load More</button>
  </div>
</div>

<script src="config.js"></script>
<script src="shared.js"></script>
<script>
  App.buildNav('');
  document.documentElement.lang = App.Lang.current();
  const API_KEY = (window.MOVIEZDB_CONFIG && window.MOVIEZDB_CONFIG.TMDB_KEY) || '';
  const IMG     = 'https://image.tmdb.org/t/p/w500';
  const params  = new URLSearchParams(window.location.search);
  const query   = params.get('q') || '';

  const spinner    = document.getElementById('spinner-container');
  const results    = document.getElementById('results');
  const lmWrap     = document.getElementById('lm-wrap');
  const lmBtn      = document.getElementById('lm-btn');
  const countEl    = document.getElementById('result-count');
  const headingEl  = document.getElementById('heading');

  let allItems=[], filter='all', page=1, totalPages=1, loading=false;

  // Pre-fill nav search
  if (query) {
    document.title = `"${query}" — TMDB`;
    headingEl.innerHTML = `RESULTS FOR <em>"${query}"</em>`;
    setTimeout(()=>{ const inp=document.querySelector('.nav-search-input'); if(inp) inp.value=query; }, 80);
  }

  function makeMediaCard(r) {
    const isMovie = r.media_type==='movie';
    const t    = r.title||r.name||'Unknown';
    const yr   = (r.release_date||r.first_air_date||'').slice(0,4);
    const rat  = r.vote_average?r.vote_average.toFixed(1):'N/A';
    const img  = r.poster_path ? `${IMG}${r.poster_path}` : '';
    const href = isMovie ? `details.html?movieId=${r.id}` : `details.html?seriesId=${r.id}`;
    const type = isMovie?'movie':'tv';
    const card = document.createElement('a');
    card.href=href; card.className='m-card';
    card.innerHTML=`<img src="${img}" alt="${t}" loading="lazy"><div class="m-badge">★ ${rat}</div>
      <div class="m-body"><div class="m-title">${t}</div><div class="m-meta">${yr||'—'} · ${isMovie?'Movie':'TV'}</div></div>`;
    App.injectCardActions(card, r.id, type, ()=>t);
    return card;
  }

  function makePersonRow(r) {
    const photo = r.profile_path ? `${IMG}${r.profile_path}` : `https://ui-avatars.com/api/?name=${encodeURIComponent(r.name)}&background=1a1a24&color=7a7a8c&size=104`;
    return `<a href="person.html?personId=${r.id}" class="p-row">
      <img class="p-avatar" src="${photo}" alt="${r.name}" loading="lazy">
      <div><div class="p-name">${r.name}</div><div class="p-dept">${r.known_for_department||'Actor'}</div></div>
    </a>`;
  }

  function renderResults() {
    const visible = filter==='all' ? allItems : allItems.filter(r=>r.media_type===filter);
    results.innerHTML='';

    if (!visible.length) {
      results.innerHTML=`<div class="empty-state"><h3>No Results</h3><p>Try a different filter or search term.</p></div>`;
      return;
    }

    const people = visible.filter(r=>r.media_type==='person');
    const media  = visible.filter(r=>r.media_type!=='person');

    if (filter==='person' || (people.length && !media.length)) {
      const list = document.createElement('div'); list.className='people-list';
      list.innerHTML = people.map(makePersonRow).join(''); results.appendChild(list);
    } else if (filter!=='all' && !people.length) {
      const grid = document.createElement('div'); grid.className='media-grid';
      media.forEach(r=>grid.appendChild(makeMediaCard(r))); results.appendChild(grid);
    } else {
      // Mixed — separate sections
      if (media.length) {
        const sec=document.createElement('div'); sec.className='results-section';
        const lbl=document.createElement('div'); lbl.className='results-section-label'; lbl.textContent='MOVIES & TV';
        const grid=document.createElement('div'); grid.className='media-grid';
        media.forEach(r=>grid.appendChild(makeMediaCard(r)));
        sec.appendChild(lbl); sec.appendChild(grid); results.appendChild(sec);
      }
      if (people.length) {
        const sec=document.createElement('div'); sec.className='results-section';
        const lbl=document.createElement('div'); lbl.className='results-section-label'; lbl.textContent='PEOPLE';
        const list=document.createElement('div'); list.className='people-list';
        list.innerHTML=people.map(makePersonRow).join('');
        sec.appendChild(lbl); sec.appendChild(list); results.appendChild(sec);
      }
    }
  }

  async function fetchPage(p=1, append=false) {
    if (!query||loading) return; loading=true; lmBtn.disabled=true;
    if (!append) { spinner.classList.remove('hidden'); results.classList.add('hidden'); lmWrap.classList.add('hidden'); allItems=[]; }
    try {
      const res=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&language=${App.Lang.getApiParam()}&query=${encodeURIComponent(query)}&page=${p}`);
      const data=await res.json();
      totalPages=Math.min(data.total_pages||1,20); page=p;
      const newItems=(data.results||[]).filter(r=>r.media_type!=='unknown');
      allItems=append?[...allItems,...newItems]:newItems;

      const total=data.total_results||allItems.length;
      countEl.textContent=`${total.toLocaleString()} result${total!==1?'s':''} for "${query}"`;

      // Update tab counts
      document.getElementById('cnt-all').textContent   = allItems.length;
      document.getElementById('cnt-movie').textContent  = allItems.filter(r=>r.media_type==='movie').length;
      document.getElementById('cnt-tv').textContent     = allItems.filter(r=>r.media_type==='tv').length;
      document.getElementById('cnt-person').textContent = allItems.filter(r=>r.media_type==='person').length;

      spinner.classList.add('hidden'); results.classList.remove('hidden');
      renderResults();
      lmWrap.classList.toggle('hidden', page>=totalPages);
    } catch {
      spinner.classList.add('hidden');
      results.innerHTML='<p class="error-msg">Search failed. Please try again.</p>';
      results.classList.remove('hidden');
    }
    loading=false; lmBtn.disabled=false;
  }

  // Tab switching
  document.getElementById('filter-tabs').addEventListener('click', e=>{
    const tab=e.target.closest('.f-tab');
    if (!tab) return;
    document.querySelectorAll('.f-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    filter=tab.dataset.type;
    renderResults();
  });

  lmBtn.addEventListener('click',()=>fetchPage(page+1,true));

  if (query) { fetchPage(); }
  else {
    spinner.classList.add('hidden'); results.classList.remove('hidden');
    results.innerHTML='<div class="empty-state"><h3>Search TMDB</h3><p>Use the search bar above to find movies, TV shows, and people.</p></div>';
    countEl.textContent='Enter a query to get started';
  }
</script>
</body>
</html>
